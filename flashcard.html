<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>闪卡 | System Design 面试速成</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .flashcard {
      height: auto;
      min-height: 350px;
    }
    .flashcard-front, .flashcard-back {
      padding: 2rem;
      height: auto;
      min-height: 350px;
    }
    .flashcard-question {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .flashcard-category {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      display: inline-block;
    }
    .flashcard-answer {
      font-size: 1rem;
      line-height: 1.8;
      text-align: left;
      white-space: pre-line;
    }
    .flashcard-followup {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed rgba(0,0,0,0.2);
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .flashcard-back {
      background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
      color: #1F2937;
    }
    .mode-selector {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .mode-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .mode-btn:hover, .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .lang-btn {
      padding: 0.4rem 0.8rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--text);
      margin-left: 1rem;
    }
    .lang-btn:hover {
      background: var(--bg);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index.html" class="nav-brand">SD 面试速成</a>
    <div class="nav-links">
      <a href="learn.html">学习</a>
      <a href="flashcard.html" class="active">闪卡</a>
      <a href="neetcode.html">NeetCode</a>
      <a href="quiz.html">Quiz</a>
      <a href="deepdive.html">深入</a>
      <a href="behavioral.html">BQ</a>
      <a href="calculator.html">计算</a>
      <a href="progress.html">进度</a>
      <a href="search.html" title="搜索 (⌘K)">🔍</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="切换主题">🌙</button>
      <a href="index-en.html" class="lang-btn">🇺🇸 EN</a>
    </div>
  </nav>
  <script src="js/theme.js"></script>

  <div class="flashcard-container" style="max-width: 600px;">
    <div class="mode-selector" id="modes">
      <button class="mode-btn active" data-mode="all" onclick="setMode('all')">全部</button>
      <button class="mode-btn" data-mode="权衡决策" onclick="setMode('权衡决策')">权衡决策</button>
      <button class="mode-btn" data-mode="数字估算" onclick="setMode('数字估算')">数字估算</button>
      <button class="mode-btn" data-mode="场景判断" onclick="setMode('场景判断')">场景判断</button>
      <button class="mode-btn" data-mode="设计题" onclick="setMode('设计题')">设计题</button>
      <button class="mode-btn" data-mode="面试技巧" onclick="setMode('面试技巧')">面试技巧</button>
    </div>

    <div class="stats-bar">
      <span id="progress-text">1 / 30</span>
      <span id="category-text">权衡决策</span>
    </div>
    
    <div class="flashcard" id="flashcard" onclick="flip()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="flashcard-category" id="category">权衡决策</div>
          <div class="flashcard-question" id="question">什么时候选 SQL，什么时候选 NoSQL？</div>
          <div class="flashcard-hint">点击查看答案 💡</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-answer" id="answer">...</div>
          <div class="flashcard-followup" id="followup">...</div>
        </div>
      </div>
    </div>

    <div class="flashcard-nav">
      <button class="btn btn-secondary" onclick="prev()">← 上一题</button>
      <button class="btn btn-secondary" onclick="shuffle()">🔀 随机</button>
      <button class="btn btn-primary" onclick="next()">下一题 →</button>
    </div>

    <p style="text-align: center; color: var(--text-secondary); margin-top: 1rem; font-size: 0.85rem;">
      快捷键：← → 切换，空格 翻转，R 随机
    </p>
  </div>

  <script src="flashcardData.js"></script>
  <script>
    let allCards = [...FlashcardData];
    let cards = [...FlashcardData];
    let currentIndex = 0;
    let currentMode = 'all';

    function setMode(mode) {
      currentMode = mode;
      if (mode === 'all') {
        cards = [...allCards];
      } else {
        cards = allCards.filter(c => c.category === mode);
      }
      currentIndex = 0;
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      render();
    }

    function render() {
      if (cards.length === 0) {
        document.getElementById('question').textContent = '没有匹配的卡片';
        return;
      }
      
      const item = cards[currentIndex];
      document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('category-text').textContent = item.category;
      document.getElementById('category').textContent = item.category;
      document.getElementById('question').textContent = item.question;
      document.getElementById('answer').textContent = item.answer;
      document.getElementById('followup').textContent = item.followUp ? `💬 ${item.followUp}` : '';
      document.getElementById('flashcard').classList.remove('flipped');
    }

    function flip() {
      document.getElementById('flashcard').classList.toggle('flipped');
    }

    function prev() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function next() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        render();
      } else {
        currentIndex = 0;
        render();
      }
    }

    function shuffle() {
      cards = cards.sort(() => Math.random() - 0.5);
      currentIndex = 0;
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
      if (e.key === ' ') { e.preventDefault(); flip(); }
      if (e.key === 'r' || e.key === 'R') shuffle();
    });

    render();
  </script>
<script src="js/theme.js"></script>
<script src="js/shortcuts.js"></script>
</body>
</html>
