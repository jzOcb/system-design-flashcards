<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>搜索 | System Design 面试速成</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .search-container {
      max-width: 800px;
      margin: 2rem auto;
      padding: 0 1rem;
    }
    .search-box {
      position: relative;
      margin-bottom: 2rem;
    }
    .search-input {
      width: 100%;
      padding: 1rem 1rem 1rem 3rem;
      font-size: 1.1rem;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color 0.2s;
    }
    .search-input:focus {
      border-color: var(--primary);
    }
    .search-icon {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.25rem;
      color: var(--text-secondary);
    }
    .search-hint {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.8rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
    }
    .search-filters {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .filter-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
    }
    .results-count {
      color: var(--text-secondary);
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    .result-item {
      background: var(--card-bg);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
      box-shadow: var(--shadow);
      cursor: pointer;
      transition: all 0.2s;
    }
    .result-item:hover {
      transform: translateX(4px);
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .result-type {
      display: inline-block;
      font-size: 0.75rem;
      padding: 0.2rem 0.5rem;
      border-radius: 10px;
      margin-right: 0.5rem;
    }
    .result-type.concept { background: #DBEAFE; color: #1E40AF; }
    .result-type.problem { background: #D1FAE5; color: #065F46; }
    .result-type.flashcard { background: #FEF3C7; color: #92400E; }
    .result-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .result-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .result-highlight {
      background: var(--primary);
      color: white;
      padding: 0 2px;
      border-radius: 2px;
    }
    .no-results {
      text-align: center;
      padding: 3rem;
      color: var(--text-secondary);
    }
    .shortcut-hint {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }
    .shortcut-hint kbd {
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 0.2rem 0.4rem;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index-en.html" class="nav-brand">SD Interview Prep</a>
    <div class="nav-links">
      <a href="learn-en.html">Learn</a>
      <a href="flashcard-en.html">Flashcards</a>
      <a href="neetcode-en.html">NeetCode</a>
      <a href="quiz-en.html">Quiz</a>
      <a href="deepdive-en.html">Deep Dive</a>
      <a href="behavioral-en.html">BQ</a>
      <a href="calculator-en.html">Calc</a>
      <a href="progress-en.html">Progress</a>
      <a href="search-en.html" title="Search (⌘K)" class="active">🔍</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <a href="index-en.html" class="lang-btn">🇨🇳 中文</a>
    </div>
  </nav>
  <script src="js/theme.js"></script>

  <div class="search-container">
    <h1 style="text-align: center; margin-bottom: 1.5rem;">🔍 全局搜索</h1>
    
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input 
        type="text" 
        class="search-input" 
        id="search-input"
        placeholder="搜索概念、题目、闪卡..."
        autofocus
      >
      <span class="search-hint">⌘K</span>
    </div>

    <div class="search-filters">
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">全部</button>
      <button class="filter-btn" data-filter="concept" onclick="setFilter('concept')">概念</button>
      <button class="filter-btn" data-filter="problem" onclick="setFilter('problem')">LeetCode</button>
      <button class="filter-btn" data-filter="flashcard" onclick="setFilter('flashcard')">Flashcards</button>
    </div>

    <div class="results-count" id="results-count"></div>
    <div id="results"></div>

    <div class="shortcut-hint">
      <kbd>↑</kbd> <kbd>↓</kbd> 导航 · <kbd>Enter</kbd> 打开 · <kbd>Esc</kbd> 清空
    </div>
  </div>

  <script src="wordData.js"></script>
  <script src="neetcodeData.js"></script>
  <script src="flashcardData-en.js"></script>
  <script>
    let currentFilter = 'all';
    let allItems = [];
    let selectedIndex = -1;

    // Build search index
    function buildIndex() {
      // System Design concepts
      if (typeof WordRoots !== 'undefined') {
        WordRoots.forEach(item => {
          allItems.push({
            type: 'concept',
            title: item.root,
            desc: item.meaning,
            keywords: [item.root, item.meaning, item.description, ...item.examples].join(' ').toLowerCase(),
            url: `learn.html#${item.id}`
          });
        });
      }

      // NeetCode problems
      if (typeof NeetCodeData !== 'undefined') {
        NeetCodeData.categories.forEach(cat => {
          cat.problems.forEach(p => {
            allItems.push({
              type: 'problem',
              title: p.name,
              desc: `${cat.name} · ${p.difficulty} · ${p.pattern}`,
              keywords: [p.name, cat.name, p.pattern, p.difficulty].join(' ').toLowerCase(),
              url: `https://leetcode.com/problems/${p.name.toLowerCase().replace(/ /g, '-').replace(/[^a-z0-9-]/g, '')}/`
            });
          });
        });
      }

      // Flashcards
      if (typeof FlashcardDataEN !== 'undefined') {
        FlashcardDataEN.forEach((item, i) => {
          allItems.push({
            type: 'flashcard',
            title: item.question.substring(0, 60) + (item.question.length > 60 ? '...' : ''),
            desc: item.answer.substring(0, 80) + '...',
            keywords: [item.question, item.answer, item.category].join(' ').toLowerCase(),
            url: `flashcard.html#${i}`
          });
        });
      }
    }

    function search(query) {
      if (!query.trim()) {
        document.getElementById('results').innerHTML = '';
        document.getElementById('results-count').textContent = '';
        return;
      }

      const q = query.toLowerCase();
      let results = allItems.filter(item => {
        if (currentFilter !== 'all' && item.type !== currentFilter) return false;
        return item.keywords.includes(q);
      });

      // Sort by relevance (title match first)
      results.sort((a, b) => {
        const aTitle = a.title.toLowerCase().includes(q);
        const bTitle = b.title.toLowerCase().includes(q);
        if (aTitle && !bTitle) return -1;
        if (!aTitle && bTitle) return 1;
        return 0;
      });

      render(results, q);
    }

    function render(results, query) {
      document.getElementById('results-count').textContent = 
        results.length > 0 ? `找到 ${results.length} 个结果` : '';

      if (results.length === 0) {
        document.getElementById('results').innerHTML = `
          <div class="no-results">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🔍</div>
            <div>没有找到 "${query}" 相关内容</div>
          </div>
        `;
        return;
      }

      document.getElementById('results').innerHTML = results.slice(0, 50).map((item, i) => `
        <div class="result-item ${i === selectedIndex ? 'selected' : ''}" 
             onclick="window.open('${item.url}', '_blank')"
             data-index="${i}">
          <span class="result-type ${item.type}">
            ${item.type === 'concept' ? '📖 概念' : item.type === 'problem' ? '💻 题目' : '🎴 闪卡'}
          </span>
          <div class="result-title">${highlight(item.title, query)}</div>
          <div class="result-desc">${highlight(item.desc, query)}</div>
        </div>
      `).join('');
    }

    function highlight(text, query) {
      if (!query) return text;
      const regex = new RegExp(`(${query})`, 'gi');
      return text.replace(regex, '<span class="result-highlight">$1</span>');
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      search(document.getElementById('search-input').value);
    }

    // Event listeners
    const input = document.getElementById('search-input');
    input.addEventListener('input', (e) => {
      selectedIndex = -1;
      search(e.target.value);
    });

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      const results = document.querySelectorAll('.result-item');
      
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        selectedIndex = Math.min(selectedIndex + 1, results.length - 1);
        updateSelection(results);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        selectedIndex = Math.max(selectedIndex - 1, 0);
        updateSelection(results);
      } else if (e.key === 'Enter' && selectedIndex >= 0) {
        results[selectedIndex]?.click();
      } else if (e.key === 'Escape') {
        input.value = '';
        search('');
        input.focus();
      } else if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
        e.preventDefault();
        input.focus();
        input.select();
      }
    });

    function updateSelection(results) {
      results.forEach((el, i) => {
        el.style.background = i === selectedIndex ? 'var(--bg)' : '';
      });
      if (results[selectedIndex]) {
        results[selectedIndex].scrollIntoView({ block: 'nearest' });
      }
    }

    // Init
    buildIndex();
  </script>
<script src="js/shortcuts.js"></script>
</body>
</html>
