<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcards | System Design Interview Prep</title>
  <link rel="stylesheet" href="css/minimal.css">
  <style>
    .flashcard {
      height: auto;
      min-height: 400px;
    }
    .flashcard-front, .flashcard-back {
      padding: 2rem;
      height: auto;
      min-height: 400px;
    }
    .flashcard-question {
      font-size: 1.4rem;
      font-weight: 700;
      line-height: 1.4;
      margin-bottom: 1rem;
    }
    .flashcard-category {
      font-size: 0.85rem;
      color: var(--text-secondary);
      background: var(--bg);
      padding: 0.25rem 0.75rem;
      border-radius: 20px;
      margin-bottom: 1rem;
      display: inline-block;
    }
    .flashcard-answer {
      font-size: 0.95rem;
      line-height: 1.8;
      text-align: left;
      white-space: pre-line;
    }
    .flashcard-followup {
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px dashed rgba(0,0,0,0.2);
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .flashcard-back {
      background: linear-gradient(135deg, #60A5FA 0%, #3B82F6 100%);
      color: white;
    }
    .mode-selector {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .mode-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--card-bg);
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }
    .mode-btn:hover, .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
    }
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
      color: var(--text-secondary);
    }
    .lang-btn {
      padding: 0.4rem 0.8rem;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      font-size: 0.8rem;
      text-decoration: none;
      color: var(--text);
      margin-left: 1rem;
    }
    .lang-btn:hover {
      background: var(--bg);
    }
  </style>
</head>
<body>
  <nav class="nav">
    <a href="index-en.html" class="nav-brand">SD Interview Prep</a>
    <div class="nav-links">
      <a href="learn.html">Learn</a>
      <a href="flashcard-en.html" class="active">Flashcards</a>
      <a href="quiz.html">Quiz</a>
      <a href="deepdive.html">Deep Dive</a>
      <a href="flashcard.html" class="lang-btn">🇨🇳 中文</a>
    </div>
  </nav>

  <div class="flashcard-container" style="max-width: 650px;">
    <div class="mode-selector" id="modes">
      <button class="mode-btn active" data-mode="all" onclick="setMode('all')">All</button>
      <button class="mode-btn" data-mode="Trade-offs" onclick="setMode('Trade-offs')">Trade-offs</button>
      <button class="mode-btn" data-mode="Estimation" onclick="setMode('Estimation')">Estimation</button>
      <button class="mode-btn" data-mode="Scenarios" onclick="setMode('Scenarios')">Scenarios</button>
      <button class="mode-btn" data-mode="Components" onclick="setMode('Components')">Components</button>
      <button class="mode-btn" data-mode="Design Problems" onclick="setMode('Design Problems')">Design</button>
      <button class="mode-btn" data-mode="Interview Tips" onclick="setMode('Interview Tips')">Tips</button>
    </div>

    <div class="stats-bar">
      <span id="progress-text">1 / 30</span>
      <span id="category-text">Trade-offs</span>
    </div>
    
    <div class="flashcard" id="flashcard" onclick="flip()">
      <div class="flashcard-inner">
        <div class="flashcard-front">
          <div class="flashcard-category" id="category">Trade-offs</div>
          <div class="flashcard-question" id="question">When to use SQL vs NoSQL?</div>
          <div class="flashcard-hint">Click to reveal answer 💡</div>
        </div>
        <div class="flashcard-back">
          <div class="flashcard-answer" id="answer">...</div>
          <div class="flashcard-followup" id="followup">...</div>
        </div>
      </div>
    </div>

    <div class="flashcard-nav">
      <button class="btn btn-secondary" onclick="prev()">← Previous</button>
      <button class="btn btn-secondary" onclick="shuffle()">🔀 Shuffle</button>
      <button class="btn btn-primary" onclick="next()">Next →</button>
    </div>

    <p style="text-align: center; color: var(--text-secondary); margin-top: 1rem; font-size: 0.85rem;">
      Hotkeys: ← → navigate, Space to flip, R to shuffle
    </p>
  </div>

  <script src="flashcardData-en.js"></script>
  <script>
    let allCards = [...FlashcardDataEN];
    let cards = [...FlashcardDataEN];
    let currentIndex = 0;
    let currentMode = 'all';

    function setMode(mode) {
      currentMode = mode;
      if (mode === 'all') {
        cards = [...allCards];
      } else {
        cards = allCards.filter(c => c.category === mode);
      }
      currentIndex = 0;
      
      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === mode);
      });
      
      render();
    }

    function render() {
      if (cards.length === 0) {
        document.getElementById('question').textContent = 'No cards in this category';
        return;
      }
      
      const item = cards[currentIndex];
      document.getElementById('progress-text').textContent = `${currentIndex + 1} / ${cards.length}`;
      document.getElementById('category-text').textContent = item.category;
      document.getElementById('category').textContent = item.category;
      document.getElementById('question').textContent = item.question;
      document.getElementById('answer').textContent = item.answer;
      document.getElementById('followup').textContent = item.followUp ? `💬 ${item.followUp}` : '';
      document.getElementById('flashcard').classList.remove('flipped');
    }

    function flip() {
      document.getElementById('flashcard').classList.toggle('flipped');
    }

    function prev() {
      if (currentIndex > 0) {
        currentIndex--;
        render();
      }
    }

    function next() {
      if (currentIndex < cards.length - 1) {
        currentIndex++;
        render();
      } else {
        currentIndex = 0;
        render();
      }
    }

    function shuffle() {
      cards = cards.sort(() => Math.random() - 0.5);
      currentIndex = 0;
      render();
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft') prev();
      if (e.key === 'ArrowRight') next();
      if (e.key === ' ') { e.preventDefault(); flip(); }
      if (e.key === 'r' || e.key === 'R') shuffle();
    });

    render();
  </script>
</body>
</html>
