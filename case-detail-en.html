<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Detail | System Design Interview Prep</title>
    <link rel="stylesheet" href="css/minimal.css">
    <style>
        .case-container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .case-header {
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--primary);
        }
        .case-title {
            font-size: 2rem;
            color: var(--primary-dark);
            margin-bottom: 0.75rem;
        }
        .case-meta {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }
        .meta-badge {
            padding: 0.3rem 0.75rem;
            border-radius: 15px;
            font-size: 0.85rem;
            font-weight: 500;
        }
        .category-product { background: #DBEAFE; color: #1E40AF; }
        .category-infrastructure { background: #F3E8FF; color: #6B21A8; }
        .difficulty-medium { background: #FEF3C7; color: #92400E; }
        .difficulty-hard { background: #FEE2E2; color: #991B1B; }

        .section {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
        }
        .section-title {
            font-size: 1.25rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subsection-title {
            font-size: 1rem;
            font-weight: 600;
            margin: 1rem 0 0.5rem;
            color: var(--text);
        }
        .list-item {
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.95rem;
        }
        .api-endpoint {
            font-family: monospace;
            padding: 0.5rem 0.75rem;
            background: var(--bg);
            border-radius: 6px;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }
        .http-method {
            display: inline-block;
            padding: 0.15rem 0.5rem;
            border-radius: 4px;
            font-weight: 600;
            font-size: 0.8rem;
            margin-right: 0.5rem;
        }
        .method-get { background: #D1FAE5; color: #065F46; }
        .method-post { background: #DBEAFE; color: #1E40AF; }
        .method-put { background: #FEF3C7; color: #92400E; }
        .method-delete { background: #FEE2E2; color: #991B1B; }

        .design-diagram {
            padding: 1rem;
            background: var(--bg);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.8;
            white-space: pre-wrap;
        }
        .deep-dive-card {
            background: var(--bg);
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-left: 3px solid var(--primary);
        }
        .deep-dive-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .deep-dive-details {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
        }
        .nav-btn {
            padding: 0.75rem 1.5rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-btn:hover { transform: translateY(-2px); }
        .nav-btn:disabled { background: var(--border); cursor: not-allowed; }
    </style>
</head>
<body>
  <nav class="nav">
    <a href="index-en.html" class="nav-brand">SD Interview Prep</a>
    <div class="nav-links">
      <a href="learn-en.html">Learn</a>
      <a href="flashcard-en.html">Flashcards</a>
      <a href="neetcode-en.html">NeetCode</a>
      <a href="quiz-en.html">Quiz</a>
      <a href="deepdive-en.html" class="active">Deep Dive</a>
      <a href="behavioral-en.html">BQ</a>
      <a href="calculator-en.html">Calc</a>
      <a href="progress-en.html">Progress</a>
      <a href="search-en.html" title="Search (⌘K)">🔍</a>
      <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">🌙</button>
      <a href="index-en.html" class="lang-btn">🇨🇳 中文</a>
    </div>
  </nav>
  <script src="js/theme.js"></script>

    <div class="case-container">
        <a href="cases-en.html" style="color: var(--primary); text-decoration: none; display: inline-block; margin-bottom: 1rem;">← Back to Cases</a>
        
        <div id="caseContent"></div>

        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn" onclick="navigateCase('prev')">← Previous</button>
            <button class="nav-btn" id="nextBtn" onclick="navigateCase('next')">Next →</button>
        </div>
    </div>

    <script src="casesData-en.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const caseId = urlParams.get('id');
        const caseContent = document.getElementById('caseContent');
        
        const currentCaseIndex = casesData.cases.findIndex(c => c.id === caseId);
        const currentCase = casesData.cases[currentCaseIndex];

        if (!currentCase) {
            caseContent.innerHTML = '<p>Case not found。<a href="cases-en.html">Return to cases</a></p>';
        } else {
            renderCase(currentCase);
            updateNavButtons(currentCaseIndex);
        }

        function renderCase(item) {
            const catClass = item.category === 'Product Design' ? 'category-product' : 'category-infrastructure';
            const diffClass = item.difficulty === 'Medium' ? 'difficulty-medium' : 'difficulty-hard';
            const catLabel = item.category === 'Product Design' ? 'Product Design' : 'Infrastructure';

            caseContent.innerHTML = `
                <div class="case-header">
                    <h1 class="case-title">${item.title}</h1>
                    <div class="case-meta">
                        <span class="meta-badge ${catClass}">${catLabel}</span>
                        <span class="meta-badge ${diffClass}">${item.difficulty}</span>
                    </div>
                </div>

                <div class="section">
                    <h2 class="section-title">📋 Requirements</h2>
                    <h3 class="subsection-title">Functional Requirements</h3>
                    ${item.requirements.functional.map(r => '<div class="list-item">' + r + '</div>').join('')}
                    <h3 class="subsection-title">非Functional Requirements</h3>
                    ${item.requirements.non_functional.map(r => '<div class="list-item">' + r + '</div>').join('')}
                </div>

                ${item.estimation ? `
                <div class="section">
                    <h2 class="section-title">🧮 Capacity Estimation</h2>
                    <div class="design-diagram">${formatText(item.estimation)}</div>
                </div>
                ` : ''}

                <div class="section">
                    <h2 class="section-title">🔌 API Design</h2>
                    ${item.api_design.map(api => {
                        const parts = api.split(' ');
                        const method = parts[0];
                        if (['GET','POST','PUT','DELETE','PATCH','WebSocket'].includes(method)) {
                            return '<div class="api-endpoint"><span class="http-method method-' + method.toLowerCase() + '">' + method + '</span>' + parts.slice(1).join(' ') + '</div>';
                        }
                        return '<div class="api-endpoint" style="color:var(--text-secondary);">' + api + '</div>';
                    }).join('')}
                </div>

                <div class="section">
                    <h2 class="section-title">🏗️ High Level Design</h2>
                    <div class="design-diagram">${formatText(item.high_level_design)}</div>
                </div>

                <div class="section">
                    <h2 class="section-title">🔍 Deep Dive探讨</h2>
                    ${item.deep_dives.map(d => `
                        <div class="deep-dive-card">
                            <div class="deep-dive-title">💡 ${d.topic}</div>
                            <div class="deep-dive-details">${formatText(d.details)}</div>
                        </div>
                    `).join('')}
                </div>

                ${item.interviewTips ? `
                <div class="section" style="background: #ECFDF5; border-left: 4px solid #10B981;">
                    <h2 class="section-title">💡 Interview Tips</h2>
                    ${item.interviewTips.map(t => '<div class="list-item" style="background: white;">' + t + '</div>').join('')}
                </div>
                ` : ''}

                ${item.commonMistakes ? `
                <div class="section" style="background: #FEF2F2; border-left: 4px solid #EF4444;">
                    <h2 class="section-title">⚠️ Common Mistakes</h2>
                    ${item.commonMistakes.map(m => '<div class="list-item" style="background: white;">' + m + '</div>').join('')}
                </div>
                ` : ''}
            `;
        }

        function formatText(text) {
            if (!text) return '';
            return text
                .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre style="background:#1a1a2e;color:#eee;padding:1rem;border-radius:8px;overflow-x:auto;font-size:0.85rem;"><code>$2</code></pre>')
                .replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:0.15rem 0.4rem;border-radius:4px;font-size:0.9em;">$1</code>')
                .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n\n/g, '</p><p>')
                .replace(/\n/g, '<br>');
        }

        function updateNavButtons(idx) {
            document.getElementById('prevBtn').disabled = idx <= 0;
            document.getElementById('nextBtn').disabled = idx >= casesData.cases.length - 1;
        }

        function navigateCase(dir) {
            let newIdx = currentCaseIndex + (dir === 'prev' ? -1 : 1);
            newIdx = Math.max(0, Math.min(casesData.cases.length - 1, newIdx));
            if (newIdx !== currentCaseIndex) {
                location.href = 'case-detail-en.html?id=' + casesData.cases[newIdx].id;
            }
        }
    </script>
    <script src="js/shortcuts.js"></script>
</body>
</html>
